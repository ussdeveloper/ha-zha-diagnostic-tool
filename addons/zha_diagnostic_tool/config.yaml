name: "ZHA Diagnostic Companion"
version: "0.9.22"
slug: "zha_diagnostic_tool"
description: "Companion add-on with web UI: Zigbee monitoring, switch delay, charts, battery monitor, mirror switch"
url: "https://github.com/ussdeveloper/ha-zha-diagnostic-tool"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
init: false
homeassistant: "2024.6.0"
hassio_api: true
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_icon: mdi:chart-timeline-variant
panel_title: ZHA Diagnostic UI
map:
  - config:rw
ports:
  8099/tcp: null
options:
  poll_interval_seconds: 2
  max_delay_samples: 300
  mirror_cooldown_ms: 1200
  grafana_theme: "vscode-dark"
schema:
  poll_interval_seconds: "int(1,30)"
  max_delay_samples: "int(50,5000)"
  mirror_cooldown_ms: "int(100,10000)"
  grafana_theme: "list(vscode-dark|grafana-dark)"
