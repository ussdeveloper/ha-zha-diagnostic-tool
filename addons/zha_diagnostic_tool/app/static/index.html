<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZHA Diagnostic Desktop</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" />
  <link rel="stylesheet" href="static/styles.css" />
</head>
<body>

  <!-- ===== DESKTOP SURFACE ===== -->
  <div class="desktop" id="desktop">

    <!-- Desktop shortcut icons (left column, like Win11) -->
    <div class="desktop-icons">
      <button class="desktop-shortcut" data-win="kpi-win">
        <div class="shortcut-icon"><i class="mdi mdi-chart-line"></i></div>
        <span>Pulpit KPI</span>
      </button>
      <button class="desktop-shortcut" data-win="zha-win">
        <div class="shortcut-icon"><i class="mdi mdi-zigbee"></i></div>
        <span>Encje ZHA</span>
      </button>
      <button class="desktop-shortcut" data-win="switch-win">
        <div class="shortcut-icon"><i class="mdi mdi-toggle-switch"></i></div>
        <span>Switche</span>
      </button>
      <button class="desktop-shortcut" data-win="telemetry-win">
        <div class="shortcut-icon"><i class="mdi mdi-pulse"></i></div>
        <span>Telemetria</span>
      </button>
      <button class="desktop-shortcut" data-win="mirror-win">
        <div class="shortcut-icon"><i class="mdi mdi-link-variant"></i></div>
        <span>Mirror Rules</span>
      </button>
      <button class="desktop-shortcut" data-win="sensor-win">
        <div class="shortcut-icon"><i class="mdi mdi-tune-variant"></i></div>
        <span>Sensor Rules</span>
      </button>
    </div>

    <!-- ===== FLOATING WINDOWS (hidden by default) ===== -->

    <!-- KPI & Delay -->
    <section class="window" id="kpi-win">
      <div class="window-titlebar">
        <i class="mdi mdi-chart-line win-icon"></i>
        <span class="win-title">Pulpit — KPI &amp; Delay Chart</span>
        <div class="window-controls">
          <span class="win-ctrl minimize"><i class="mdi mdi-minus"></i></span>
          <span class="win-ctrl maximize"><i class="mdi mdi-checkbox-blank-outline"></i></span>
          <span class="win-ctrl close"><i class="mdi mdi-close"></i></span>
        </div>
      </div>
      <div class="window-body">
        <div class="kpis">
          <div class="kpi"><label>Zigbee</label><strong id="kpi-entities">-</strong></div>
          <div class="kpi"><label>Switche</label><strong id="kpi-switches">-</strong></div>
          <div class="kpi"><label>Mirror</label><strong id="kpi-rules">-</strong></div>
          <div class="kpi"><label>Sensor</label><strong id="kpi-srules">-</strong></div>
          <div class="kpi"><label>AVG</label><strong id="kpi-avg">-</strong></div>
          <div class="kpi"><label>P95</label><strong id="kpi-p95">-</strong></div>
          <div class="kpi"><label>MAX</label><strong id="kpi-max">-</strong></div>
          <div class="kpi"><label>Pending</label><strong id="kpi-pending">-</strong></div>
        </div>
        <canvas id="delay-chart"></canvas>
      </div>
    </section>

    <!-- ZHA Entities -->
    <section class="window" id="zha-win">
      <div class="window-titlebar">
        <i class="mdi mdi-zigbee win-icon"></i>
        <span class="win-title">Encje ZHA</span>
        <div class="window-controls">
          <span class="win-ctrl minimize"><i class="mdi mdi-minus"></i></span>
          <span class="win-ctrl maximize"><i class="mdi mdi-checkbox-blank-outline"></i></span>
          <span class="win-ctrl close"><i class="mdi mdi-close"></i></span>
        </div>
      </div>
      <div class="window-body">
        <div class="toolbar">
          <input id="zha-search" placeholder="Szukaj encji ZHA..." />
          <span class="meta"><b id="updated-at">-</b></span>
        </div>
        <div id="zha-list" class="list"></div>
      </div>
    </section>

    <!-- Switches -->
    <section class="window" id="switch-win">
      <div class="window-titlebar">
        <i class="mdi mdi-toggle-switch win-icon"></i>
        <span class="win-title">Switche</span>
        <div class="window-controls">
          <span class="win-ctrl minimize"><i class="mdi mdi-minus"></i></span>
          <span class="win-ctrl maximize"><i class="mdi mdi-checkbox-blank-outline"></i></span>
          <span class="win-ctrl close"><i class="mdi mdi-close"></i></span>
        </div>
      </div>
      <div class="window-body">
        <div class="toolbar">
          <input id="switch-search" placeholder="Szukaj switchy..." />
        </div>
        <div id="switch-list" class="list"></div>
      </div>
    </section>

    <!-- Telemetry -->
    <section class="window" id="telemetry-win">
      <div class="window-titlebar">
        <i class="mdi mdi-pulse win-icon"></i>
        <span class="win-title">Telemetria ZHA (Realtime)</span>
        <div class="window-controls">
          <span class="win-ctrl minimize"><i class="mdi mdi-minus"></i></span>
          <span class="win-ctrl maximize"><i class="mdi mdi-checkbox-blank-outline"></i></span>
          <span class="win-ctrl close"><i class="mdi mdi-close"></i></span>
        </div>
      </div>
      <div class="window-body telemetry-body">
        <div class="telemetry-top">
          <div class="tele-legend">
            <span><i class="dot" style="background:#60cdff"></i> ZHA</span>
            <span><i class="dot" style="background:#6ccb5f"></i> State</span>
            <span><i class="dot" style="background:#fce100"></i> Call</span>
            <span><i class="dot" style="background:#ff6b6b"></i> Error</span>
          </div>
          <canvas id="telemetry-chart"></canvas>
        </div>
        <div class="telemetry-bottom">
          <div id="telemetry-log" class="list"></div>
        </div>
      </div>
    </section>

    <!-- Mirror Switches -->
    <section class="window" id="mirror-win">
      <div class="window-titlebar">
        <i class="mdi mdi-link-variant win-icon"></i>
        <span class="win-title">Mirror Switches</span>
        <div class="window-controls">
          <span class="win-ctrl minimize"><i class="mdi mdi-minus"></i></span>
          <span class="win-ctrl maximize"><i class="mdi mdi-checkbox-blank-outline"></i></span>
          <span class="win-ctrl close"><i class="mdi mdi-close"></i></span>
        </div>
      </div>
      <div class="window-body">
        <div class="form-grid mirror-form">
          <select id="mirror-source"></select>
          <select id="mirror-target"></select>
          <label class="checkbox"><input type="checkbox" id="mirror-bidirectional" checked /> Obie strony</label>
          <button class="accent" id="add-rule-btn"><i class="mdi mdi-plus"></i> Linkuj</button>
        </div>
        <div id="rules-list" class="list"></div>
      </div>
    </section>

    <!-- Sensor Range -->
    <section class="window" id="sensor-win">
      <div class="window-titlebar">
        <i class="mdi mdi-tune-variant win-icon"></i>
        <span class="win-title">Sensor Range → Switch</span>
        <div class="window-controls">
          <span class="win-ctrl minimize"><i class="mdi mdi-minus"></i></span>
          <span class="win-ctrl maximize"><i class="mdi mdi-checkbox-blank-outline"></i></span>
          <span class="win-ctrl close"><i class="mdi mdi-close"></i></span>
        </div>
      </div>
      <div class="window-body">
        <div class="form-grid sensor-form">
          <select id="sensor-entity"></select>
          <select id="sensor-switch"></select>
          <input id="sensor-min" type="number" step="any" placeholder="MIN" />
          <input id="sensor-max" type="number" step="any" placeholder="MAX" />
          <select id="sensor-in-action">
            <option value="turn_on">In: ON</option>
            <option value="turn_off">In: OFF</option>
            <option value="toggle">In: toggle</option>
          </select>
          <select id="sensor-out-action">
            <option value="none">Out: none</option>
            <option value="turn_on">Out: ON</option>
            <option value="turn_off">Out: OFF</option>
            <option value="toggle">Out: toggle</option>
          </select>
          <button class="accent" id="add-sensor-rule-btn"><i class="mdi mdi-plus"></i> Dodaj</button>
        </div>
        <div id="sensor-rules-list" class="list"></div>
      </div>
    </section>

  </div>

  <!-- ===== TASKBAR (Windows 11) ===== -->
  <div class="taskbar">
    <div class="taskbar-start">
      <button class="start-btn" title="ZHA Diagnostic Tool"><i class="mdi mdi-microsoft-windows"></i></button>
    </div>

    <div class="taskbar-apps" id="taskbar-apps">
      <button class="taskbar-app" data-win="kpi-win" title="Pulpit KPI"><i class="mdi mdi-chart-line"></i></button>
      <button class="taskbar-app" data-win="zha-win" title="Encje ZHA"><i class="mdi mdi-zigbee"></i></button>
      <button class="taskbar-app" data-win="switch-win" title="Switche"><i class="mdi mdi-toggle-switch"></i></button>
      <button class="taskbar-app" data-win="telemetry-win" title="Telemetria"><i class="mdi mdi-pulse"></i></button>
      <button class="taskbar-app" data-win="mirror-win" title="Mirror"><i class="mdi mdi-link-variant"></i></button>
      <button class="taskbar-app" data-win="sensor-win" title="Sensor Rules"><i class="mdi mdi-tune-variant"></i></button>
      <button class="taskbar-app" id="refresh-btn" title="Odśwież dane"><i class="mdi mdi-refresh"></i></button>
    </div>

    <div class="taskbar-tray">
      <div class="taskbar-status">
        <span id="taskbar-dot" class="dot"></span>
        <span id="taskbar-status-text">Inicjalizacja...</span>
      </div>
      <div class="taskbar-clock" id="taskbar-clock"></div>
    </div>
  </div>

  <script src="static/app.js"></script>
</body>
</html>
